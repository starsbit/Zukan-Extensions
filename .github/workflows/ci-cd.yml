name: CI/CD

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-extensions:
    name: Test Extensions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests for save-liked-media-from-x-chrome
        working-directory: extensions/save-liked-media-from-x-chrome
        run: npm test

      - name: Run tests for save-to-zukan-chrome
        working-directory: extensions/save-to-zukan-chrome
        run: npm test

  test-telegram-bot:
    name: Test Telegram Bot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bot dependencies
        working-directory: bots/telegram
        run: pip install -r requirements.txt

      - name: Run bot tests
        working-directory: bots/telegram
        run: python -m unittest test_bot.py

  release-extensions:
    name: Release Bundled Extensions
    runs-on: ubuntu-latest
    needs: test-extensions
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build extension bundles
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist

          (
            cd extensions/save-liked-media-from-x-chrome
            zip -r "../../dist/save-liked-media-from-x-chrome-${TAG}.zip" .
          )

          (
            cd extensions/save-to-zukan-chrome
            zip -r "../../dist/save-to-zukan-chrome-${TAG}.zip" .
          )

          mkdir -p dist/extensions-bundle
          cp -R extensions/save-liked-media-from-x-chrome dist/extensions-bundle/
          cp -R extensions/save-to-zukan-chrome dist/extensions-bundle/
          (
            cd dist/extensions-bundle
            zip -r "../extensions-bundle-${TAG}.zip" .
          )

      - name: Create GitHub release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/save-liked-media-from-x-chrome-*.zip
            dist/save-to-zukan-chrome-*.zip
            dist/extensions-bundle-*.zip

  publish-bot-image:
    name: Publish Telegram Bot Docker Image
    runs-on: ubuntu-latest
    needs:
      - test-extensions
      - test-telegram-bot
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare lowercase image name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/telegram-bot" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: bots/telegram
          file: bots/telegram/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
